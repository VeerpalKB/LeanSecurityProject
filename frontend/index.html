<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure System Verification</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

    <!-- Main heading for the frontend interface of prototype -->
        <h1> Secure System Verification</h1>

    <!-- Displays instruction to the user -->
        <p>Select a security property to verify:</p>

    <!-- Verification form displays a drop-down menu, allowing the user to select one out of three 
     security properties. 
     At the IPD stage, Access Control is fully implemented, whilst User Authentication and 
     Encryption Integrity are included for later implementation. -->

        <form id="verification-form">
          <label for="model-input">Enter system model:</label>
          <p><em>Define users and their permissions for verification:</em></p>
          <textarea id="model-input" rows="6" style="width:100%; margin-bottom:10px;">
            Alice: authorised
            Bob: authorised
            Eve: unauthorised
          </textarea>

            <label for="property">Choose a property:</label>
            <select id="property" name="property">
                <option value="authentication">Authentication</option>
                <option value="access_control">Access Control</option>
                <option value="integrity">Integrity</option>
            </select>

          <!-- Button is displayed and when clicked on, triggers the verification function.
           This uses JavaScript to call the backend instead of submitting the form automatically.-->
            <button type="button" id="verify-btn">Verify</button>
        </form>

<!-- This output code block is responsible for displaying the raw verification result 
 returned by the backend. -->
<div class="output">
  <p><strong>Output:</strong></p>
  <p id="output">Waiting for verification...</p>
</div>

<button id="download-proof" style="display:none; margin-top:10px;">
  View Formal Proof File (Lean)
</button>

<p id="backend-explanation" style="margin-top:10px; color:#555;"></p>

<!-- This explanation-panel code block shows a human-readable explanation of the formal 
 verification result.
 This is hidden and is only shown after verification is executed.-->
<div id="explanation-panel" style="display:none; margin-top:20px; padding:15px; border:1px solid #ccc;">
  <p><strong>Verification Explanation:</strong></p>
  <ul id="explanation-list"></ul>
</div>

    </div>

<script>
/**
 * Event handler for the Verify button.
 * 
 * This sends a request to the backend verification endpoint and updates the UI
 * based on the response.
 * 
 * */
document.querySelector("#verify-btn").onclick = async () => {
  const property = document.querySelector("#property").value;
  const model = document.querySelector("#model-input").value;

  try {
    const response = await fetch(`/verify`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ property, model })
    });

    const data = await response.json();

    // Output
    document.getElementById("output").innerText = data.result;

    // Backend explanation
    document.getElementById("backend-explanation").innerText =
      data.explanation;

    // Explanation panel
    showExplanation(property, data.result);

    // Proof button
    const proofBtn = document.getElementById("download-proof");

    if (data.proofFile) {
      proofBtn.style.display = "inline-block";

      proofBtn.onclick = () => {
        window.open(`/proofs/${data.proofFile}`, "_blank");
      };
    } else {
      proofBtn.style.display = "none";
    }

  } catch (error) {
    console.error(error);

    document.getElementById("output").innerText =
      "Error connecting to backend";
  }
};



/**
 * The showExplanation function is implemented here and is used to
 * generate a human-readable explanation of the verification result.
 * 
 * This bridges formal verification and user understanding.
 * 
 * */
function showExplanation(property, output) {

  const modelText = document.querySelector("#model-input").value;
  const lines = modelText.split("\n");
  
  let authorisedUsers = [];
  let unauthorisedUsers = [];
  
  lines.forEach(line => {
    const lower = line.toLowerCase();
    
    if (lower.includes("authorised")) {
      const name = line.split(":")[0].trim();
      authorisedUsers.push(name);
    }
    
    if (lower.includes("unauthorised")) {
      const name = line.split(":")[0].trim();
      unauthorisedUsers.push(name);
    }
  });
  
  const panel = document.getElementById("explanation-panel");
  const list = document.getElementById("explanation-list");

  // Clears the previous explanation
  list.innerHTML = "";
  panel.style.display = "block";

  /** ACCESS CONTROL — VERIFIED CASE
   * Linked directly to the Lean proof implemented in the formal verification
   * layer.
   * 
   * */
  if (
    property === "access_control" &&
    output.toLowerCase().includes("verified")
  ) {
    const explanations = [
      "Property verified: Access Control Security",
      `Verified users: ${authorisedUsers.join(", ")}`,
      `Rejected users: ${unauthorisedUsers.join(", ")}`,
      "Reason: Only authorised users are permitted access to protected resources."
    ];

    explanations.forEach(text => {
      const li = document.createElement("li");
      li.innerText = text;
      list.appendChild(li);
    });

    return;
  }

  // ACCESS CONTROL — FAILED CASE (Included for future extensibility)
  if (property === "access_control") {
    const li = document.createElement("li");
    li.innerText =
      "Access control property could not be verified.";
    list.appendChild(li);
    return;
  }

// AUTHENTICATION — VERIFIED CASE
if (
  property === "authentication" &&
  output.toLowerCase().includes("verified")
) {
  const explanations = [
    "Property verified: Authentication Security",
    `Authenticated users: ${authorisedUsers.join(", ")}`,
    `Unauthenticated users: ${unauthorisedUsers.join(", ")}`,
    "Reason: Only authenticated users are permitted access to the system."
  ];

  explanations.forEach(text => {
    const li = document.createElement("li");
    li.innerText = text;
    list.appendChild(li);
  });

  return;
}

// INTEGRITY - VERIFIED CASE
if (
  property === "integrity" &&
  output.toLowerCase().includes("verified")
) {
  const explanations = [
    "Property verified: Integrity",
    `Authorised users (can modify): ${authorisedUsers.join(", ")}`,
    `Unauthorised users (cannot modify): ${unauthorisedUsers.join(", ")}`,
    "Reason: Only authorised users are permitted to modify system data."
  ];

  explanations.forEach(text => {
    const li = document.createElement("li");
    li.innerText = text;
    list.appendChild(li);
  });

  return;
}

  // OTHER PROPERTIES (NOT IMPLEMENTED YET AT THE IPD STAGE)
  const li = document.createElement("li");
  li.innerText =
    "This security property is not yet implemented in the current prototype.";
  list.appendChild(li);
}
</script>

</body>
</html>
